<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARXMATIK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #0d0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #aaaaaa;
            margin-bottom: 25px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            text-decoration: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .youtube-btn {
            background-color: #ff0000;
            color: #ffffff;
        }

        .telegram-btn {
            background-color: #0088cc;
            color: #ffffff;
        }

        .link-btn:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="carxmatik.png" alt="CARXMATIK" class="profile-img">

        <h1>CARXMATIK</h1>
        <p class="subtitle">Sosial sebekelerimiz asagida</p>

        <div class="links-container">
            <a href="https://youtube.com/@carxmatik?si=dk5laKMkowLg-CyF" target="_blank" class="link-btn youtube-btn">
                <span class="icon">▶</span> YouTube
            </a>
            <a href="https://t.me/carxmatik" target="_blank" class="link-btn telegram-btn">
                <span class="icon">✈</span> Telegram
            </a>
        </div>
    </div>

</body>
</html>
